title: Breast Radiology Quick-Start
description: >-
  A practical introduction to breast radiology for core radiology trainees.
theme: just-the-docs

url: "https://rosewarnedm.github.io"
baseurl: "/breast-radiology-quickstart"

color_scheme: light

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

nav_sort: case_insensitive
heading_anchors: true

footer_content: >-
  Breast Radiology Quick-Start &mdash; AI-generated content requires expert review before clinical use.
  Values marked &lt;&lt;like this&gt;&gt; must be independently verified.

callouts_level: quiet
callouts:
  note:
    title: Note
    color: purple
  important:
    title: Important
    color: blue
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - raw/
  - Gemfile
  - Gemfile.lock
  - "*.py"
  - "*.sh"

plugins:
  - jekyll-seo-tag
  - jekyll-tabs
